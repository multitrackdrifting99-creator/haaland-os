nch","salt"],["1 tbsp","honey"],["1","banana, sliced"]],steps:["Oats, milk and salt into a small pot over medium heat.","Simmer 4 to 5 min, stirring, until thick and creamy.","Into a bowl. Honey over the top, banana on top of that."]},{id:"prep",emoji:"\u{1F371}",title:"Sunday prep block",tag:"Batch \xB7 Mon to Wed lunches",serves:"3 lunches",time:"45 min",protein:"~40g per lunch",ingredients:[["1kg","potatoes, chopped into 3cm chunks"],["2","carrots, thick coins"],["2","zucchini, thick half moons"],["1 head","broccoli, florets"],["3 tbsp","olive oil"],["1.5 tsp","salt"],["500g","beef mince"],["1","brown onion, diced"],["6","eggs"]],steps:["0:00. Oven to 200C. Chop everything while it heats.","0:05. Potatoes and veg on a big tray, olive oil and salt, toss with your hands. In the oven for 40 min, turn once at 20.","0:10. Large pan, medium high. Onion 3 min, then mince, breaking it up, 6 to 8 min until browned. Salt it.","0:20. Pot of water to the boil. Eggs in for 8 min, then straight into cold water. Peel later or don't.","0:45. Tray out. Split everything across 3 containers: veg, mince, 2 eggs each."],tip:"One tray, one pan, one pot. Lunches are now a fridge door away all week."},{id:"steak",emoji:"\u{1F969}",title:"Pan steak",tag:"Dinner \xB7 rump cap or porterhouse",serves:"1",time:"15 min + resting",protein:"~55g",ingredients:[["1","steak, 250 to 300g, 3cm thick"],["1 tsp","olive oil"],["15g","butter"],["1 clove","garlic, smashed (optional)"],["","salt, more than feels right"]],steps:["Steak out of the fridge 20 min before. Pat completely dry, salt hard on both sides.","Pan on high for 2 min until it just smokes. Add the oil.","Steak in. 3 min without touching it.","Flip. 3 min more. Last minute: butter and garlic in, tilt the pan, spoon it over.","Pull at 52 to 54C in the middle for medium rare. Rest 5 min on a warm plate."],tip:"The thermometer removes all doubt. 52 to 54C, every time, forever."},{id:"rumpcap",emoji:"\u{1F525}",title:"Whole rump cap roast",tag:"Weekend centrepiece",serves:"2 to 3",time:"~50 min",protein:"~55g per serve",ingredients:[["800g to 1kg","whole rump cap (picanha), fat cap on"],["","salt, heavily, especially the fat"]],steps:["Out of the fridge 30 min before. Score the fat cap lightly in a diamond pattern, do not cut into the meat. Salt everywhere.","Oven at 120C. Cap on a rack over a tray, fat side up.","Roast until the centre reads 50 to 52C, roughly 25 to 40 min depending on thickness. Trust the thermometer, not the clock.","Rest 10 min.","Screaming hot dry pan. Fat side down 2 min until it crackles and browns, then 1 min on the meat side.","Slice across the grain into thick strips. Leftovers are Monday lunch."],tip:"Same ritual as the tomahawk at a third of the price. This is the weekly big steak."},{id:"tomahawk",emoji:"\u{1F9B4}",title:"Tomahawk",tag:"Treat weeks only",serves:"2",time:"~75 min",protein:"~60g per serve",ingredients:[["1","tomahawk, 1 to 1.2kg, reserved Thursday"],["","salt, generously, the day before if you remember"]],steps:["Out of the fridge 45 min before. Pat dry, salt hard.","Oven at 120C, steak on a rack. Roast until the centre reads 50 to 52C, about 45 to 60 min.","Rest 10 min.","Screaming hot pan. 1 to 2 min per side to build the crust. Stand it on the fat edge for 30 seconds too.","Slice off the bone, cut across the grain, flake salt over the top."]},{id:"liver",emoji:"\u{1F969}",title:"Liver and onions",tag:"1 to 2x a week",serves:"1 to 2",time:"25 min (mostly soak)",protein:"~50g",ingredients:[["400g","beef or lamb liver, sliced 1cm"],["300ml","milk, for soaking (optional)"],["1","brown onion, sliced"],["40g","butter, split in half"],["","salt"]],steps:["Optional but worth it: soak the liver slices in milk for 20 min. Drain, pat very dry.","Half the butter, medium heat. Onion 8 to 10 min until golden and soft. Set aside.","Same pan, high heat, rest of the butter.","Liver in a single layer. 2 min on the first side, 1 to 2 min on the second. The centre stays pink.","Salt, onions back in for 30 seconds, done."],tip:"Overcooked liver is why people hate liver. Pink centre, always."},{id:"heart",emoji:"\u{1FAC0}",title:"Beef heart strips",tag:"1 to 2x a week",serves:"2",time:"30 min (20 is marinating)",protein:"~55g per serve",ingredients:[["500g","beef heart (half a heart), trimmed"],["2 tbsp","olive oil"],["1 clove","garlic, crushed"],["1/2","lemon, juiced"],["","salt"]],steps:["Thawed overnight in the fridge. Trim off any remaining silverskin and fat, slice into 1cm strips.","Toss with the oil, garlic, lemon and salt. 20 min on the bench.","Screaming hot pan or grill. Strips in a single layer, 90 seconds to 2 min per side. Medium rare.","Rest 3 min. It eats like a lean, slightly sweet steak."]},{id:"whiting",emoji:"\u{1F41F}",title:"Crispy King George whiting",tag:"Fish night",serves:"1",time:"10 min",protein:"~55g",ingredients:[["300g","whiting fillets (or garfish, flathead, snapper)"],["2 tbsp","plain flour"],["40g","butter"],["1/2","lemon"],["","salt"]],steps:["Pat the fillets very dry. Light dust of flour and salt, shake off the excess.","Butter in a pan over medium high until foaming.","Fillets in, skin side down, 2 min. Flip carefully, 1 min on the flesh side.","Squeeze the lemon into the pan for the last 20 seconds and spoon it over. Eat immediately."]},{id:"sardines",emoji:"\u{1F41F}",title:"Pan sardines",tag:"Fish night \xB7 cheapest wild fish going",serves:"1 to 2",time:"10 min",protein:"~45g per 250g",ingredients:[["500g","SA sardines, butterflied at the counter"],["1 tbsp","olive oil"],["1/2","lemon"],["","salt"]],steps:["Pat dry. Rub with the oil, salt well.","Pan or grill on maximum heat until properly hot.","Skin side down 2 min, flesh side 1 min. They cook fast, do not walk away.","Lemon over the top. Done in the time it took to read this."],tip:"Omega 3, vitamin D and calcium in one cheap fish. This is the highest value meal in the whole system."},{id:"roo",emoji:"\u{1F998}",title:"Kangaroo fillet",tag:"Midweek \xB7 from Drakes",serves:"1 to 2",time:"15 min + resting",protein:"~45g per serve",ingredients:[["400g","K-Roo fillet"],["1 tbsp","olive oil, rubbed on the meat, not the pan"],["","salt"]],steps:["Oil and salt the meat itself. Pan on high until smoking.","2 to 3 min per side. Pull at 55 to 58C in the middle. Medium rare maximum, roo has no fat to forgive you.","Rest 8 to 10 min under loose foil. This step is not optional with roo.","Slice thin, across the grain."]},{id:"friedrice",emoji:"\u{1F35A}",title:"Egg fried rice",tag:"Leftover rice, 10 minutes",serves:"1",time:"10 min",protein:"~18g",ingredients:[["250g","cold cooked rice (yesterday's)"],["2","eggs, beaten"],["2","spring onions, sliced"],["20g","butter"],["","salt (splash of soy if you keep it)"]],steps:["Butter in a hot pan. Eggs in, scramble 1 min, push to the side.","Rice in. Press it flat, leave 1 min to catch some colour, then toss. 3 to 4 min total.","Spring onions and salt through for the last minute."],tip:"Egg fried rice shows up in his reported menus. Cold day-old rice is the trick, fresh rice goes gluggy."},{id:"brisket",emoji:"\u{1F356}",title:"Slow cooker brisket",tag:"Rotation \xB7 every 2 to 3 weeks",serves:"6",time:"15 min work, 8 hr slow (or 75 min pressure)",protein:"~50g per serve",ingredients:[["1.5kg","brisket"],["2","brown onions, thick slices"],["4 cloves","garlic, smashed"],["2 tsp","salt"],["1 tsp","black pepper"],["2 tsp","smoked paprika"],["300ml","passata or water"]],steps:["Rub the brisket all over with salt, pepper and paprika.","Onions and garlic in the base of the slow cooker, brisket on top, passata around it.","Low for 8 hours. Instant Pot instead: pressure 75 min, natural release 15.","Shred with two forks into the juices.","Eat with rice or roast potatoes, or in tacos. Freeze the rest in meal portions."],tip:"Brisket tacos in the slow cooker are reportedly his favourite thing to make at home."},{id:"lasagne",emoji:"\u{1F35D}",title:"The pre-match lasagne",tag:"Batch \xB7 night before training",serves:"6",time:"90 min",protein:"~35g per serve",ingredients:[["500g","beef mince"],["1","brown onion, diced"],["2 cloves","garlic, crushed"],["700g","passata"],["1 tbsp","olive oil"],["1 tsp","dried oregano"],["60g","butter (white sauce)"],["60g","plain flour (white sauce)"],["600ml","milk (white sauce)"],["250g","lasagne sheets"],["150g","grated mozzarella"],["40g","parmesan"],["","salt, pinch of nutmeg if you have it"]],steps:["Ragu: oil in a pot, onion 3 min, garlic 1 min, mince until browned. Passata, oregano, salt. Simmer 25 min.","White sauce: melt the butter, stir in the flour, cook 1 min. Whisk in the milk gradually. Stir over medium until thick, 8 to 10 min. Salt, nutmeg.","Oven to 180C. In a baking dish: ragu, sheets, white sauce. Repeat for 3 layers, finishing with white sauce, mozzarella and parmesan on top.","Bake 35 to 40 min until golden and bubbling. Rest 10 min before cutting or it collapses.","Cut into 6. Eat one, fridge two, freeze three."],tip:"His dad cooks him lasagne before every home game. Yours comes out of the freezer the night before the gym."},{id:"hotchoc",emoji:"\u{1F36B}",title:"Bedtime hot chocolate",tag:"Evening",serves:"1",time:"5 min",protein:"~10g",ingredients:[["300ml","milk"],["2 tsp","100% cocoa powder"],["1 to 2 tsp","honey"]],steps:["Milk in a small pot over medium. Whisk in the cocoa.","Warm 3 to 4 min until steaming, not boiling.","Off the heat, stir the honey through."],tip:"He drinks hot chocolate before bed. Three ingredients, none of them a sachet."}],om=[["Protein","Eggs, beef, roo, fish, organs, dairy. Aim for a palm-plus serve every meal, roughly 1.6 to 2.2g per kg bodyweight across the day."],["Iron, B12, A, copper, folate","Liver and heart once or twice a week cover what most diets miss."],["Omega 3 + vitamin D","Sardines and whiting 2 to 3x a week. D is scarce in an Adelaide winter, so the sardines matter, and get sun when it shows up."],["Calcium","Milk, yoghurt, butter, and sardines eat
